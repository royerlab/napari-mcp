name: Release

on:
  push:
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write  # For trusted publishing to PyPI

jobs:
  # Run tests before release
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Build package
      run: |
        uv build
        ls -la dist/

    - name: Validate version matches tag
      if: contains(github.ref, 'tags')
      run: |
        WHEEL=$(ls dist/*.whl | head -1)
        WHEEL_VERSION=$(echo "$WHEEL" | sed -n 's/.*-\([0-9][0-9.]*\)-.*/\1/p')
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        echo "Wheel version: $WHEEL_VERSION"
        echo "Tag version: $TAG_VERSION"
        if [ "$WHEEL_VERSION" != "$TAG_VERSION" ]; then
          echo "ERROR: Version mismatch! Wheel=$WHEEL_VERSION Tag=$TAG_VERSION"
          exit 1
        fi

    - name: Check build artifacts
      run: |
        uv pip install --system twine
        twine check dist/*

    - name: Create GitHub Release
      if: contains(github.ref, 'tags') && !inputs.dry_run
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to PyPI (using trusted publishing)
      if: contains(github.ref, 'tags') && !inputs.dry_run
      uses: pypa/gh-action-pypi-publish@release/v1
      # No need for TWINE_USERNAME/PASSWORD with trusted publishing

    - name: Dry run notification
      if: inputs.dry_run
      run: |
        echo "🔍 Dry run complete - artifacts built but not published"
        echo "Built artifacts:"
        ls -la dist/
        echo "Wheel contents:"
        ls -lh dist/
