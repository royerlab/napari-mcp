name: Release

on:
  push:
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write  # For trusted publishing to PyPI

jobs:
  # Run tests before release
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Build package
      run: |
        uv build
        ls -la dist/

    - name: Install release tools
      run: |
        uv pip install --system twine packaging

    - name: Validate version matches tag
      if: contains(github.ref, 'tags')
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}" python <<'PY'
        import email
        import os
        import pathlib
        import zipfile

        from packaging.version import Version

        wheel = next(pathlib.Path("dist").glob("*.whl"))
        with zipfile.ZipFile(wheel) as zf:
            metadata_name = next(
                name for name in zf.namelist() if name.endswith(".dist-info/METADATA")
            )
            metadata = email.message_from_bytes(zf.read(metadata_name))

        wheel_version = Version(metadata["Version"])
        tag_version = Version(os.environ["TAG_VERSION"])

        print(f"Wheel version: {wheel_version}")
        print(f"Tag version: {tag_version}")

        if wheel_version != tag_version:
            raise SystemExit(
                f"ERROR: Version mismatch! Wheel={wheel_version} Tag={tag_version}"
            )
        PY

    - name: Detect prerelease
      id: release_meta
      if: contains(github.ref, 'tags')
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}" python <<'PY'
        import os
        from packaging.version import Version

        tag_version = Version(os.environ["TAG_VERSION"])
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"prerelease={str(tag_version.is_prerelease).lower()}\n")
        PY

    - name: Check build artifacts
      run: |
        twine check dist/*

    - name: Create GitHub Release
      if: contains(github.ref, 'tags') && !inputs.dry_run
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ steps.release_meta.outputs.prerelease || 'false' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to PyPI (using trusted publishing)
      if: contains(github.ref, 'tags') && !inputs.dry_run
      uses: pypa/gh-action-pypi-publish@release/v1
      # No need for TWINE_USERNAME/PASSWORD with trusted publishing

    - name: Dry run notification
      if: inputs.dry_run
      run: |
        echo "🔍 Dry run complete - artifacts built but not published"
        echo "Built artifacts:"
        ls -la dist/
        echo "Wheel contents:"
        ls -lh dist/
